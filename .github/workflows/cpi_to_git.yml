name: Sync SAP CPI Artifacts to Git

on:
  workflow_dispatch:
    inputs:

      PACKAGE_ID:
        description: "SAP CPI Package ID"
        required: true
        type: string

      ARTIFACT_TYPE:
        description: "Artifact Type"
        required: true
        default: "IntegrationFlow"
        type: choice
        options:
          - IntegrationFlow
          - ValueMapping
          - MessageMapping
          - ScriptCollection
          - All

      SYNC_MODE:
        description: "Sync Mode"
        required: true
        default: "ALL"
        type: choice
        options:
          - ALL
          - SINGLE

      ARTIFACT_ID:
        description: "Artifact ID (Required for SINGLE mode)"
        required: false
        type: string

      BRANCH_NAME:
        description: "Target Git Branch"
        required: true
        default: "CPI-Main"
        type: string

permissions:
  contents: write

jobs:
  sync-artifacts:
    runs-on: ubuntu-latest

    steps:

      # ============================================
      # CHECKOUT REPOSITORY
      # ============================================

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0


      # ============================================
      # INSTALL REQUIRED TOOLS
      # ============================================

      - name: Install Required Packages
        run: |

          sudo apt-get update

          sudo apt-get install -y jq unzip

      # ============================================
      # FETCH AND PROCESS CPI ARTIFACTS
      # ============================================

      - name: Fetch and Process CPI Artifacts

        env:
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          AUTH_URL: ${{ secrets.AUTH_URL }}
          CPI_TMN_HOST: ${{ secrets.CPI_TMN_HOST }}

        run: |

          set -e

          PACKAGE_ID="${{ github.event.inputs.PACKAGE_ID }}"
          ARTIFACT_TYPE="${{ github.event.inputs.ARTIFACT_TYPE }}"
          SYNC_MODE="${{ github.event.inputs.SYNC_MODE }}"
          ARTIFACT_ID_INPUT="${{ github.event.inputs.ARTIFACT_ID }}"
          BRANCH_NAME="${{ github.event.inputs.BRANCH_NAME }}"

          # ============================================
          # URL ENCODE PACKAGE ID
          # ============================================

          ENCODED_PACKAGE_ID=$(printf '%s' "$PACKAGE_ID" | sed 's/ /%20/g')

          # ============================================
          # VALIDATE INPUT COMBINATIONS
          # ============================================

          if [ "$ARTIFACT_TYPE" = "All" ] && \
             [ "$SYNC_MODE" = "SINGLE" ]; then

            echo "Invalid selection"

            echo "ARTIFACT_TYPE=All supports only SYNC_MODE=ALL"

            exit 1

          fi

          # ============================================
          # VALIDATE SINGLE MODE INPUT
          # ============================================

          if [ "$SYNC_MODE" = "SINGLE" ] && \
             [ -z "$ARTIFACT_ID_INPUT" ]; then

            echo "ARTIFACT_ID is required for SINGLE mode"

            exit 1

          fi

          # ============================================
          # VALIDATE ARTIFACT TYPE
          # ============================================

          case "$ARTIFACT_TYPE" in

            IntegrationFlow|ValueMapping|MessageMapping|ScriptCollection|All)

              echo "Valid artifact type"

              ;;

            *)

              echo "Invalid artifact type: ${ARTIFACT_TYPE}"

              exit 1

              ;;

          esac

          # ============================================
          # VALIDATE TARGET BRANCH EXISTS
          # ============================================

          echo "Validating target branch: ${BRANCH_NAME}"

          if git ls-remote --exit-code --heads origin "${BRANCH_NAME}" > /dev/null; then

            echo "Branch exists: ${BRANCH_NAME}"

          else

            echo "Target branch not found: ${BRANCH_NAME}"

            exit 1

          fi

          # ============================================
          # CHECKOUT TARGET BRANCH
          # ============================================

          echo "Checking out branch: ${BRANCH_NAME}"

          git checkout "${BRANCH_NAME}"

          TMP_DIR="/tmp/cpi_sync_$(date +%s)"

          mkdir -p "$TMP_DIR"

          # ============================================
          # FETCH OAUTH TOKEN
          # ============================================

          echo "Fetching OAuth token from SAP CPI..."

          TOKEN_RESPONSE=$(curl -s -X POST "$AUTH_URL" \
            -u "$CLIENT_ID:$CLIENT_SECRET" \
            -d "grant_type=client_credentials&response_type=token")

          ACCESS_TOKEN=$(echo "$TOKEN_RESPONSE" | jq -r '.access_token')

          if [ -z "$ACCESS_TOKEN" ] || \
             [ "$ACCESS_TOKEN" == "null" ]; then

            echo "Failed to fetch access token"

            echo "$TOKEN_RESPONSE"

            exit 1

          fi

          echo "OAuth token fetched successfully"

          # ============================================
          # VALIDATE PACKAGE EXISTS
          # ============================================

          echo "Validating package: ${PACKAGE_ID}"

          PACKAGE_STATUS=$(curl -s \
            -o /dev/null \
            -w "%{http_code}" \
            -X GET \
            "${CPI_TMN_HOST}/api/v1/IntegrationPackages('${ENCODED_PACKAGE_ID}')" \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "Accept: application/json")

          if [ "$PACKAGE_STATUS" -ne 200 ]; then

            echo "Package not found: ${PACKAGE_ID}"

            exit 1

          fi

          echo "Package exists"

          PACKAGE_ROOT="${{ github.workspace }}/${PACKAGE_ID}"

          mkdir -p "$PACKAGE_ROOT"

          # ============================================
          # FUNCTION TO PROCESS ARTIFACT TYPE
          # ============================================

          process_artifact_type () {

            ARTIFACT_FOLDER=$1
            API_ENTITY=$2

            echo "--------------------------------------------"

            echo "Processing Artifact Type: $ARTIFACT_FOLDER"

            API_URL="${CPI_TMN_HOST}/api/v1/IntegrationPackages('${ENCODED_PACKAGE_ID}')/${API_ENTITY}"

            ARTIFACTS_JSON=$(curl -s -X GET "$API_URL" \
              -H "Authorization: Bearer $ACCESS_TOKEN" \
              -H "Accept: application/json" \
              -H "Cache-Control: no-cache")

            TARGET_DIR="${PACKAGE_ROOT}/${ARTIFACT_FOLDER}"

            mkdir -p "$TARGET_DIR"

            ARTIFACT_IDS=$(echo "$ARTIFACTS_JSON" | jq -r '.d.results[]?.Id')

            # ============================================
            # EMPTY ARTIFACT TYPE
            # ============================================

            if [ -z "$ARTIFACT_IDS" ]; then

              echo "No ${ARTIFACT_FOLDER} artifacts found."

              touch "${TARGET_DIR}/.gitkeep"

              return

            fi

            FOUND_SINGLE_ARTIFACT=false

            # ============================================
            # PROCESS EACH ARTIFACT
            # ============================================

            for ARTIFACT_ID in $ARTIFACT_IDS; do

              # ============================================
              # SINGLE ARTIFACT FILTER
              # ============================================

              if [ "$SYNC_MODE" = "SINGLE" ] && \
                 [ "$ARTIFACT_ID" != "$ARTIFACT_ID_INPUT" ]; then

                echo "Skipping artifact: $ARTIFACT_ID"

                continue

              fi

              FOUND_SINGLE_ARTIFACT=true

              echo "Processing ${ARTIFACT_FOLDER}: $ARTIFACT_ID"

              ARTIFACT_GIT_DIR="${TARGET_DIR}/${ARTIFACT_ID}"

              rm -rf "$ARTIFACT_GIT_DIR"

              mkdir -p "$ARTIFACT_GIT_DIR"

              # ============================================
              # TRY DRAFT VERSION FIRST
              # ============================================

              echo "Checking DRAFT version for $ARTIFACT_ID..."

              DOWNLOAD_URL="${CPI_TMN_HOST}/api/v1/${API_ENTITY}(Id='$ARTIFACT_ID',Version='draft')/\$value"

              HTTP_STATUS=$(curl -s \
                -o "$TMP_DIR/$ARTIFACT_ID.zip" \
                -w "%{http_code}" \
                -X GET "$DOWNLOAD_URL" \
                -H "Authorization: Bearer $ACCESS_TOKEN" \
                -H "Cache-Control: no-cache")

              ARTIFACT_VERSION="draft"

              # ============================================
              # FALLBACK TO ACTIVE VERSION
              # ============================================

              if [ "$HTTP_STATUS" -ne 200 ]; then

                echo "Draft version not found"

                echo "Checking ACTIVE version..."

                DOWNLOAD_URL="${CPI_TMN_HOST}/api/v1/${API_ENTITY}(Id='$ARTIFACT_ID',Version='active')/\$value"

                HTTP_STATUS=$(curl -s \
                  -o "$TMP_DIR/$ARTIFACT_ID.zip" \
                  -w "%{http_code}" \
                  -X GET "$DOWNLOAD_URL" \
                  -H "Authorization: Bearer $ACCESS_TOKEN" \
                  -H "Cache-Control: no-cache")

                ARTIFACT_VERSION="active"

              fi

              # ============================================
              # FINAL FAILURE
              # ============================================

              if [ "$HTTP_STATUS" -ne 200 ]; then

                echo "Failed to fetch artifact: $ARTIFACT_ID"

                echo "Neither draft nor active version exists"

                rm -rf "$ARTIFACT_GIT_DIR"

                continue

              fi

              echo "Found ${ARTIFACT_VERSION} version"

              # ============================================
              # UNZIP ARTIFACT
              # ============================================

              if [ -f "$TMP_DIR/$ARTIFACT_ID.zip" ] && \
                 [ -s "$TMP_DIR/$ARTIFACT_ID.zip" ]; then

                unzip -q -o "$TMP_DIR/$ARTIFACT_ID.zip" \
                  -d "$ARTIFACT_GIT_DIR"

                echo "Successfully synced ${ARTIFACT_FOLDER}: $ARTIFACT_ID"

              else

                echo "ZIP file invalid for $ARTIFACT_ID"

                rm -rf "$ARTIFACT_GIT_DIR"

              fi

            done

            # ============================================
            # SINGLE ARTIFACT VALIDATION
            # ============================================

            if [ "$SYNC_MODE" = "SINGLE" ] && \
               [ "$FOUND_SINGLE_ARTIFACT" = false ]; then

              echo "Artifact not found: ${ARTIFACT_ID_INPUT}"

              exit 1

            fi
          }

          # ============================================
          # PROCESS SELECTED ARTIFACT TYPE
          # ============================================

          echo "Selected Artifact Type: $ARTIFACT_TYPE"

          if [ "$ARTIFACT_TYPE" = "IntegrationFlow" ]; then

            process_artifact_type \
              "IntegrationFlow" \
              "IntegrationDesigntimeArtifacts"

          elif [ "$ARTIFACT_TYPE" = "ScriptCollection" ]; then

            process_artifact_type \
              "ScriptCollection" \
              "ScriptCollectionDesigntimeArtifacts"

          elif [ "$ARTIFACT_TYPE" = "ValueMapping" ]; then

            process_artifact_type \
              "ValueMapping" \
              "ValueMappingDesigntimeArtifacts"

          elif [ "$ARTIFACT_TYPE" = "MessageMapping" ]; then

            process_artifact_type \
              "MessageMapping" \
              "MessageMappingDesigntimeArtifacts"

          elif [ "$ARTIFACT_TYPE" = "All" ]; then

            process_artifact_type \
              "IntegrationFlow" \
              "IntegrationDesigntimeArtifacts"

            process_artifact_type \
              "ScriptCollection" \
              "ScriptCollectionDesigntimeArtifacts"

            process_artifact_type \
              "ValueMapping" \
              "ValueMappingDesigntimeArtifacts"

            process_artifact_type \
              "MessageMapping" \
              "MessageMappingDesigntimeArtifacts"

          else

            echo "Invalid ARTIFACT_TYPE"

            exit 1

          fi

          # ============================================
          # CLEANUP
          # ============================================

          rm -rf "$TMP_DIR"

      # ============================================
      # COMMIT AND PUSH
      # ============================================

      - name: Commit and Push Changes
        run: |

          PACKAGE_ID="${{ github.event.inputs.PACKAGE_ID }}"
          BRANCH_NAME="${{ github.event.inputs.BRANCH_NAME }}"

          git config --global user.name "github-actions[bot]"

          git config --global user.email \
            "github-actions[bot]@users.noreply.github.com"

          echo "Git Status"

          git status

          git add -A "${PACKAGE_ID}/"

          if [[ -n $(git status --porcelain) ]]; then

            echo "Changes detected"

            git commit -m \
              "Auto-sync CPI Package: ${PACKAGE_ID} (${GITHUB_RUN_NUMBER})"

            echo "Pushing updates to GitHub..."

            git push origin "${BRANCH_NAME}"

            echo "Sync completed successfully"

          else

            echo "No changes detected."

          fi