name: Sync Git to SAP CPI

on:
  workflow_dispatch:
    inputs:
      sap_cpi_package_id:
        description: 'SAP CPI Package ID'
        required: true
        type: string
      artifact_type:
        description: 'Artifact Type to sync'
        required: true
        default: 'IntegrationFlow'
        type: choice
        options:
          - IntegrationFlow
          - ValueMapping
          - MessageMapping
          - ScriptCollection
          - all
      sync_mode:
        description: 'Sync Mode (SINGLE for specific artifact name, ALL for entire type/package)'
        required: true
        default: 'ALL'
        type: choice
        options:
          - ALL
          - SINGLE
      artifact_name:
        description: 'Artifact Name (Required only if Sync Mode is SINGLE)'
        required: false
        type: string
      target_git_branch:
        description: 'Target Git Branch to pull from'
        required: true
        type: string

jobs:
  sync-to-cpi:
    runs-on: ubuntu-latest
    
    env:
      CPI_HOST: ${{ secrets.CPI_TMN_HOST }}
      CPI_CLIENT_ID: ${{ secrets.CLIENT_ID }}
      CPI_CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
      CPI_TOKEN_URL: ${{ secrets.AUTH_URL }}

    steps:
      - name: Checkout Code from Target Branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.target_git_branch }}

      - name: Validate Inputs and Sync Artifacts
        shell: bash
        run: |
          echo "========================================="
          echo " Starting Validation & Sync Process "
          echo "========================================="

          PACKAGE_ID="${{ github.event.inputs.sap_cpi_package_id }}"
          ARTIFACT_TYPE="${{ github.event.inputs.artifact_type }}"
          SYNC_MODE="${{ github.event.inputs.sync_mode }}"
          ARTIFACT_NAME="${{ github.event.inputs.artifact_name }}"
          GIT_BRANCH="${{ github.event.inputs.target_git_branch }}"

          echo "Target Branch: $GIT_BRANCH"
          echo "Package ID: $PACKAGE_ID"
          echo "Selected Type: $ARTIFACT_TYPE"
          echo "Sync Mode: $SYNC_MODE"

          # 1. BASE PACKAGE VALIDATION
          if [ ! -d "./$PACKAGE_ID" ]; then
            echo "❌ ERROR: Package folder './$PACKAGE_ID' does not exist in branch '$GIT_BRANCH'."
            exit 1
          fi

          if [[ ! "$PACKAGE_ID" =~ ^[a-zA-Z0-9_\-]+$ ]]; then
            echo "❌ ERROR: Invalid SAP CPI Package ID format: '$PACKAGE_ID'"
            exit 1
          fi

          # 2. CONDITIONAL VALIDATION FOR SINGLE SYNC
          if [ "$SYNC_MODE" == "SINGLE" ]; then
            if [ -z "$ARTIFACT_NAME" ]; then
              echo "❌ ERROR: Sync Mode is set to 'SINGLE' but no 'Artifact Name' was provided."
              exit 1
            fi
            
            if [ "$ARTIFACT_TYPE" != "all" ]; then
              LOCAL_PATH="./$PACKAGE_ID/$ARTIFACT_TYPE/$ARTIFACT_NAME"
              if [ ! -d "$LOCAL_PATH" ] && [ ! -f "$LOCAL_PATH" ]; then
                echo "❌ ERROR: Local path '$LOCAL_PATH' for artifact '$ARTIFACT_NAME' does not exist."
                exit 1
              fi
            fi
          fi

          if [ "$ARTIFACT_TYPE" == "all" ] && [ "$SYNC_MODE" == "SINGLE" ]; then
            echo "⚠️ WARNING: Conflict detected. Artifact Type is 'all', resetting Sync Mode to 'ALL'."
            SYNC_MODE="ALL"
          fi

          # 3. CPI AUTHENTICATION BLOCK
          echo "Fetching Access Token from SAP CPI Integration Suite..."
          if [ -z "$CPI_TOKEN_URL" ] || [ -z "$CPI_CLIENT_ID" ] || [ -z "$CPI_CLIENT_SECRET" ]; then
            echo "❌ ERROR: SAP CPI credentials are missing in GitHub secrets."
            exit 1
          fi

          TOKEN_RESPONSE=$(curl -s -X POST "$CPI_TOKEN_URL" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=client_credentials" \
            -d "client_id=$CPI_CLIENT_ID" \
            -d "client_secret=$CPI_CLIENT_SECRET")

          ACCESS_TOKEN=$(echo "$TOKEN_RESPONSE" | grep -oP '"access_token":"\K[^"]+')
          if [ -z "$ACCESS_TOKEN" ]; then
            echo "❌ ERROR: Failed to retrieve Access Token from SAP CPI."
            exit 1
          fi
          echo "Successfully authenticated with SAP CPI."

          # Core Function to handle actual upload execution
          upload_to_cpi() {
            local p_id=$1
            local folder_type=$2
            local name=$3
            echo "🚀 Pushing Sync -> Package: $p_id | Folder Type: $folder_type | Artifact: $name"
            # (Insert your API Deployment scripts / curl calls utilizing $ACCESS_TOKEN here)
          }

          echo "-----------------------------------------"
          echo " Executing Sync Operations... "
          echo "-----------------------------------------"

          # Scenario A: Sync EVERYTHING across all categories
          if [ "$ARTIFACT_TYPE" == "all" ]; then
            echo "Sync Mode: ALL ARTIFACTS across all types for Package: $PACKAGE_ID"
            GIT_FOLDERS_ARR=("IntegrationFlow" "ValueMapping" "MessageMapping" "ScriptCollection")
            
            for folder in "${GIT_FOLDERS_ARR[@]}"; do
              TARGET_DIR="./$PACKAGE_ID/$folder"
              if [ -d "$TARGET_DIR" ]; then
                # Look inside the folder for individual subdirectories/files
                for item in "$TARGET_DIR"/*; do
                  if [ -d "$item" ] || [ -f "$item" ]; then
                    ARTIFACT_BASE_NAME=$(basename "$item")
                    upload_to_cpi "$PACKAGE_ID" "$folder" "$ARTIFACT_BASE_NAME"
                  fi
                done
              else
                echo "ℹ️ No directory found for structural type: $folder"
              fi
            done

          # Scenario B: Sync ALL items found inside ONE chosen category 
          elif [ "$SYNC_MODE" == "ALL" ]; then
            echo "Sync Mode: ALL artifacts of type folder '$ARTIFACT_TYPE' in package '$PACKAGE_ID'"
            TARGET_DIR="./$PACKAGE_ID/$ARTIFACT_TYPE"
            
            if [ -d "$TARGET_DIR" ]; then
              for item in "$TARGET_DIR"/*; do
                if [ -d "$item" ] || [ -f "$item" ]; then
                  ARTIFACT_BASE_NAME=$(basename "$item")
                  upload_to_cpi "$PACKAGE_ID" "$ARTIFACT_TYPE" "$ARTIFACT_BASE_NAME"
                fi
              done
            else
              echo "❌ ERROR: Directory '$TARGET_DIR' not found in Git workspace."
              exit 1
            fi

          # Scenario C: Target one specific single folder/file
          elif [ "$SYNC_MODE" == "SINGLE" ]; then
            echo "Sync Mode: SINGLE targeted artifact sync."
            upload_to_cpi "$PACKAGE_ID" "$ARTIFACT_TYPE" "$ARTIFACT_NAME"
          fi

          echo "========================================="
          echo " Sync Job Successfully Completed! "
          echo "========================================="