name: Deploy Github Artifact to SAP CPI

on:
  workflow_dispatch:
    inputs:

      PACKAGE_ID:
        description: "SAP CPI Package ID"
        required: true
        type: string

      ARTIFACT_TYPE:
        description: "Artifact Type"
        required: true
        default: "IntegrationFlow"
        type: choice
        options:
          - IntegrationFlow
          - ValueMapping
          - MessageMapping
          - ScriptCollection
          - All

      DEPLOY_MODE:
        description: "Sync Mode(Select Sync mode 'SINGLE' only if deploying a single artifact)"
        required: true
        default: "ALL"
        type: choice
        options:
          - ALL
          - SINGLE

      ARTIFACT_ID:
        description: "Artifact ID (Required for SINGLE mode)"
        required: false
        type: string

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

      # =========================================================
      # CHECKOUT REPOSITORY
      # =========================================================

      - name: Checkout Repository
        uses: actions/checkout@v4

      # =========================================================
      # INSTALL REQUIRED PACKAGES
      # =========================================================

      - name: Install Required Packages
        run: |

          sudo apt-get update

          sudo apt-get install -y zip jq curl

      # =========================================================
      # DEPLOY TO SAP CPI
      # =========================================================

      - name: Deploy Artifacts to SAP CPI

        env:
          CPI_CLIENT_ID: ${{ secrets.CLIENT_ID }}
          CPI_CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          CPI_TOKEN_URL: ${{ secrets.AUTH_URL }}
          CPI_HOST: ${{ secrets.CPI_TMN_HOST }}

        run: |

          set -e

          PACKAGE_ID="${{ github.event.inputs.PACKAGE_ID }}"
          ARTIFACT_TYPE="${{ github.event.inputs.ARTIFACT_TYPE }}"
          DEPLOY_MODE="${{ github.event.inputs.DEPLOY_MODE }}"
          DEPLOY_ARTIFACT="${{ github.event.inputs.ARTIFACT_ID }}"

          # =========================================================
          # VALIDATE SINGLE MODE
          # =========================================================

          if [ "$DEPLOY_MODE" = "SINGLE" ] && \
             [ -z "$DEPLOY_ARTIFACT" ]; then

            echo "ARTIFACT_ID is required for SINGLE mode"

            exit 1

          fi

          # =========================================================
          # FETCH OAUTH TOKEN
          # =========================================================

          echo "Fetching OAuth token..."

          TOKEN_RESPONSE=$(curl -s -X POST \
            -u "$CPI_CLIENT_ID:$CPI_CLIENT_SECRET" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=client_credentials" \
            "$CPI_TOKEN_URL")

          TOKEN=$(echo "$TOKEN_RESPONSE" | jq -r '.access_token')

          if [ "$TOKEN" = "null" ] || \
             [ -z "$TOKEN" ]; then

            echo "Failed to get access token"

            echo "$TOKEN_RESPONSE"

            exit 1

          fi

          echo "OAuth token fetched"

          # =========================================================
          # VERIFY CPI API ACCESS
          # =========================================================

          echo "Testing CPI API access..."

          TEST_RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
            "$CPI_HOST/api/v1/IntegrationPackages" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/json")

          TEST_STATUS=$(echo "$TEST_RESPONSE" | grep HTTP_STATUS | cut -d: -f2)

          if [ "$TEST_STATUS" != "200" ]; then

            echo "CPI API access failed"

            echo "$TEST_RESPONSE"

            exit 1

          fi

          echo "CPI API access verified"


          # =========================================================
          # VALIDATE / CREATE PACKAGE
          # =========================================================

          echo "Checking package: $PACKAGE_ID"

          ENCODED_PACKAGE_ID=$(printf '%s' "$PACKAGE_ID" | sed 's/ /%20/g')

          PACKAGE_STATUS=$(curl -s \
            -o /dev/null \
            -w "%{http_code}" \
            -X GET \
            "$CPI_HOST/api/v1/IntegrationPackages('$ENCODED_PACKAGE_ID')" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/json")

          # =========================================================
          # PACKAGE EXISTS
          # =========================================================

          if [ "$PACKAGE_STATUS" = "200" ]; then

            echo "Package exists in CPI"

          # =========================================================
          # CREATE PACKAGE
          # =========================================================

          elif [ "$PACKAGE_STATUS" = "404" ]; then

            echo "Package not found in CPI"

            echo "Creating package: $PACKAGE_ID"

            CREATE_RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
              -X POST \
              "$CPI_HOST/api/v1/IntegrationPackages" \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" \
              -d "{
                \"Id\": \"$PACKAGE_ID\",
                \"Name\": \"$PACKAGE_ID\",
                \"ShortText\": \"$PACKAGE_ID\",
                \"Version\": \"1.0.0\"
              }")

            CREATE_STATUS=$(echo "$CREATE_RESPONSE" | grep HTTP_STATUS | cut -d: -f2)

            echo "$CREATE_RESPONSE"

            if [ "$CREATE_STATUS" != "201" ] && \
              [ "$CREATE_STATUS" != "200" ]; then

              echo "Package creation failed"

              exit 1

            fi

            echo "Package created successfully"

          else

            echo "Failed checking package"

            exit 1

          fi


          # =========================================================
          # HELPER: RESOLVE ARTIFACT TYPE CONFIG
          # Maps ARTIFACT_TYPE input to:
          #   - Git folder name under PACKAGE_ID/
          #   - CPI API resource name (for GET list & DELETE)
          #   - CPI API upload endpoint path
          #   - Whether runtime deploy is supported
          # =========================================================

          resolve_artifact_type() {
            local TYPE="$1"

            case "$TYPE" in

              IntegrationFlow)
                GIT_FOLDER="IntegrationFlow"
                CPI_LIST_RESOURCE="IntegrationDesigntimeArtifacts"
                CPI_UPLOAD_RESOURCE="IntegrationDesigntimeArtifacts"
                CPI_DELETE_RESOURCE="IntegrationDesigntimeArtifacts"
                SUPPORTS_DEPLOY=true
                ;;

              MessageMapping)
                GIT_FOLDER="MessageMapping"
                CPI_LIST_RESOURCE="MessageMappingDesigntimeArtifacts"
                CPI_UPLOAD_RESOURCE="MessageMappingDesigntimeArtifacts"
                CPI_DELETE_RESOURCE="MessageMappingDesigntimeArtifacts"
                SUPPORTS_DEPLOY=false
                ;;

              ValueMapping)
                GIT_FOLDER="ValueMapping"
                CPI_LIST_RESOURCE="ValueMappingDesigntimeArtifacts"
                CPI_UPLOAD_RESOURCE="ValueMappingDesigntimeArtifacts"
                CPI_DELETE_RESOURCE="ValueMappingDesigntimeArtifacts"
                SUPPORTS_DEPLOY=true
                ;;

              ScriptCollection)
                GIT_FOLDER="ScriptCollection"
                CPI_LIST_RESOURCE="ScriptCollectionDesigntimeArtifacts"
                CPI_UPLOAD_RESOURCE="ScriptCollectionDesigntimeArtifacts"
                CPI_DELETE_RESOURCE="ScriptCollectionDesigntimeArtifacts"
                SUPPORTS_DEPLOY=false
                ;;

              *)
                echo "Unknown artifact type: $TYPE"
                exit 1
                ;;

            esac
          }

          # =========================================================
          # HELPER: PROCESS ONE ARTIFACT TYPE
          # =========================================================

          process_artifact_type() {

            local TYPE="$1"

            resolve_artifact_type "$TYPE"

            ARTIFACT_ROOT="${{ github.workspace }}/${PACKAGE_ID}/${GIT_FOLDER}"

            # -------------------------------------------------------
            # VALIDATE GIT FOLDER EXISTS
            # -------------------------------------------------------

            if [ ! -d "$ARTIFACT_ROOT" ]; then

              echo "Folder not found for type '$TYPE', skipping: $ARTIFACT_ROOT"

              return 0

            fi

            echo ""
            echo "========================================================="
            echo "Processing artifact type: $TYPE  ->  $GIT_FOLDER"
            echo "========================================================="

            FOUND_ARTIFACT=false

            # -------------------------------------------------------
            # PACKAGE / ALL MODE:
            # DELETE CPI ARTIFACTS NOT PRESENT IN GIT
            # -------------------------------------------------------

            if [ "$DEPLOY_MODE" = "ALL" ]; then

              echo "ALL sync - removing CPI artifacts deleted from Git..."

              CPI_ARTIFACTS=$(curl -s \
                "$CPI_HOST/api/v1/IntegrationPackages('$PACKAGE_ID')/${CPI_LIST_RESOURCE}" \
                -H "Authorization: Bearer $TOKEN" \
                -H "Accept: application/json" | jq -r '.d.results[]?.Id')

              for CPI_ARTIFACT in $CPI_ARTIFACTS; do

                if [ ! -d "$ARTIFACT_ROOT/$CPI_ARTIFACT" ]; then

                  echo "'$CPI_ARTIFACT' not in Git - removing from CPI..."

                  DELETE_RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
                    -X DELETE \
                    "$CPI_HOST/api/v1/${CPI_DELETE_RESOURCE}(Id='$CPI_ARTIFACT',Version='active')" \
                    -H "Authorization: Bearer $TOKEN")

                  DELETE_STATUS=$(echo "$DELETE_RESPONSE" | grep HTTP_STATUS | cut -d: -f2)

                  echo "$DELETE_RESPONSE"

                  if [ "$DELETE_STATUS" != "200" ] && \
                     [ "$DELETE_STATUS" != "202" ] && \
                     [ "$DELETE_STATUS" != "204" ]; then

                    echo "Failed deleting artifact: $CPI_ARTIFACT"

                    exit 1

                  fi

                  echo "Deleted from CPI: $CPI_ARTIFACT"

                fi

              done

            fi

            # -------------------------------------------------------
            # PROCESS EACH ARTIFACT DIRECTORY
            # -------------------------------------------------------

            for ARTIFACT_DIR in "$ARTIFACT_ROOT"/*; do

              [ -d "$ARTIFACT_DIR" ] || continue

              ARTIFACT_ID=$(basename "$ARTIFACT_DIR")

              # ---------------------------------------------------
              # VALIDATE SINGLE ARTIFACT
              # ---------------------------------------------------

              if [ "$DEPLOY_MODE" = "SINGLE" ] && \
                 [ "$ARTIFACT_ID" = "$DEPLOY_ARTIFACT" ]; then

                FOUND_ARTIFACT=true

              fi

              # ---------------------------------------------------
              # SKIP NON-SELECTED ARTIFACTS IN SINGLE MODE
              # ---------------------------------------------------

              if [ "$DEPLOY_MODE" = "SINGLE" ] && \
                 [ "$ARTIFACT_ID" != "$DEPLOY_ARTIFACT" ]; then

                echo "Skipping: $ARTIFACT_ID"

                continue

              fi

              ZIP_FILE="/tmp/${ARTIFACT_ID}.zip"

              echo "------------------------------------------------"
              echo "Processing artifact: $ARTIFACT_ID  [$TYPE]"

              rm -f "$ZIP_FILE"

              # ---------------------------------------------------
              # CREATE ZIP
              # ---------------------------------------------------

              echo "Creating ZIP..."

              (
                cd "$ARTIFACT_DIR"

                zip -r "$ZIP_FILE" .
              )

              if [ ! -f "$ZIP_FILE" ]; then

                echo "ZIP creation failed"

                exit 1

              fi

              CONTENT=$(base64 -w 0 "$ZIP_FILE")

              # ---------------------------------------------------
              # UPLOAD STRATEGY PER ARTIFACT TYPE
              #
              # IntegrationFlow / MessageMapping / ScriptCollection:
              #   -> Try PUT (update), fallback to POST (create)
              #
              # ValueMapping:
              #   -> SAP does not support PUT for ValueMapping.
              #     Strategy: DELETE if exists, then POST (create).
              # ---------------------------------------------------

              if [ "$TYPE" = "ValueMapping" ]; then

                # -------------------------------------------------
                # VALUEMAPPING: CHECK IF EXISTS
                # -------------------------------------------------

                echo "Checking if ValueMapping exists in CPI: $ARTIFACT_ID"

                CHECK_STATUS=$(curl -s \
                  -o /dev/null \
                  -w "%{http_code}" \
                  "$CPI_HOST/api/v1/${CPI_UPLOAD_RESOURCE}(Id='$ARTIFACT_ID',Version='active')" \
                  -H "Authorization: Bearer $TOKEN" \
                  -H "Accept: application/json")

                # -------------------------------------------------
                # VALUEMAPPING: DELETE IF EXISTS
                # -------------------------------------------------

                if [ "$CHECK_STATUS" = "200" ]; then

                  echo "Existing ValueMapping found - deleting before re-create..."

                  DEL_RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
                    -X DELETE \
                    "$CPI_HOST/api/v1/${CPI_DELETE_RESOURCE}(Id='$ARTIFACT_ID',Version='active')" \
                    -H "Authorization: Bearer $TOKEN")

                  DEL_STATUS=$(echo "$DEL_RESPONSE" | grep HTTP_STATUS | cut -d: -f2)

                  echo "$DEL_RESPONSE"

                  if [ "$DEL_STATUS" != "200" ] && \
                     [ "$DEL_STATUS" != "202" ] && \
                     [ "$DEL_STATUS" != "204" ]; then

                    echo "Failed to delete existing ValueMapping: $ARTIFACT_ID"

                    exit 1

                  fi

                  echo "Deleted existing ValueMapping: $ARTIFACT_ID"

                else

                  echo "ValueMapping does not exist yet - proceeding to CREATE"

                fi

                # -------------------------------------------------
                # VALUEMAPPING: CREATE (POST)
                # -------------------------------------------------

                echo "Creating ValueMapping: $ARTIFACT_ID"

                RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
                  -X POST \
                  "$CPI_HOST/api/v1/IntegrationPackages('$PACKAGE_ID')/${CPI_UPLOAD_RESOURCE}" \
                  -H "Authorization: Bearer $TOKEN" \
                  -H "Content-Type: application/json" \
                  -d "{
                    \"Id\": \"$ARTIFACT_ID\",
                    \"Name\": \"$ARTIFACT_ID\",
                    \"PackageId\": \"$PACKAGE_ID\",
                    \"ArtifactContent\": \"$CONTENT\"
                  }")

                STATUS=$(echo "$RESPONSE" | grep HTTP_STATUS | cut -d: -f2)

                echo "$RESPONSE"

                if [ "$STATUS" != "200" ] && \
                   [ "$STATUS" != "201" ] && \
                   [ "$STATUS" != "202" ]; then

                  echo "ValueMapping create failed: $ARTIFACT_ID"

                  exit 1

                fi

                echo "ValueMapping created: $ARTIFACT_ID"

              else

                # -------------------------------------------------
                # IntegrationFlow / MessageMapping / ScriptCollection:
                # TRY PUT (update) FIRST
                # -------------------------------------------------

                echo "Attempting UPDATE..."

                if [ "$TYPE" = "IntegrationFlow" ]; then
                  PUT_BODY="{
                    \"Name\": \"$ARTIFACT_ID\",
                    \"PackageId\": \"$PACKAGE_ID\",
                    \"ArtifactContent\": \"$CONTENT\"
                  }"
                else
                  PUT_BODY="{
                    \"ArtifactContent\": \"$CONTENT\"
                  }"
                fi

                RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
                  -X PUT \
                  "$CPI_HOST/api/v1/${CPI_UPLOAD_RESOURCE}(Id='$ARTIFACT_ID',Version='active')" \
                  -H "Authorization: Bearer $TOKEN" \
                  -H "Content-Type: application/json" \
                  -d "$PUT_BODY")

                STATUS=$(echo "$RESPONSE" | grep HTTP_STATUS | cut -d: -f2)

                echo "$RESPONSE"

                # -------------------------------------------------
                # UPDATE SUCCESS
                # -------------------------------------------------

                if [ "$STATUS" = "200" ] || \
                   [ "$STATUS" = "201" ] || \
                   [ "$STATUS" = "202" ]; then

                  echo "UPDATE successful: $ARTIFACT_ID"

                else

                  echo "UPDATE failed - trying CREATE..."

                  # -----------------------------------------------
                  # CREATE ARTIFACT (POST)
                  # -----------------------------------------------

                  RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
                    -X POST \
                    "$CPI_HOST/api/v1/IntegrationPackages('$PACKAGE_ID')/${CPI_UPLOAD_RESOURCE}" \
                    -H "Authorization: Bearer $TOKEN" \
                    -H "Content-Type: application/json" \
                    -d "{
                      \"Id\": \"$ARTIFACT_ID\",
                      \"Name\": \"$ARTIFACT_ID\",
                      \"PackageId\": \"$PACKAGE_ID\",
                      \"ArtifactContent\": \"$CONTENT\"
                    }")

                  STATUS=$(echo "$RESPONSE" | grep HTTP_STATUS | cut -d: -f2)

                  echo "$RESPONSE"

                  # -----------------------------------------------
                  # HANDLE ALREADY EXISTS - RETRY PUT
                  # -----------------------------------------------

                  if echo "$RESPONSE" | grep -qi "already exists"; then

                    echo "Artifact already exists - retrying UPDATE..."

                    RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
                      -X PUT \
                      "$CPI_HOST/api/v1/${CPI_UPLOAD_RESOURCE}(Id='$ARTIFACT_ID',Version='active')" \
                      -H "Authorization: Bearer $TOKEN" \
                      -H "Content-Type: application/json" \
                      -d "$PUT_BODY")

                    STATUS=$(echo "$RESPONSE" | grep HTTP_STATUS | cut -d: -f2)

                    echo "$RESPONSE"

                  fi

                  # -----------------------------------------------
                  # FINAL VALIDATION
                  # -----------------------------------------------

                  if [ "$STATUS" != "200" ] && \
                     [ "$STATUS" != "201" ] && \
                     [ "$STATUS" != "202" ]; then

                    echo "Artifact create/update failed: $ARTIFACT_ID"

                    exit 1

                  fi

                fi

              fi

              # ---------------------------------------------------
              # DEPLOY ARTIFACT (only for supported types)
              # IntegrationFlow and ValueMapping support runtime deploy;
              # MessageMapping and ScriptCollection do not.
              # ---------------------------------------------------

              if [ "$SUPPORTS_DEPLOY" = "true" ]; then

                echo "Deploying artifact: $ARTIFACT_ID..."

                if [ "$TYPE" = "IntegrationFlow" ]; then
                  DEPLOY_ENDPOINT="$CPI_HOST/api/v1/DeployIntegrationDesigntimeArtifact?Id='$ARTIFACT_ID'&Version='active'"
                elif [ "$TYPE" = "ValueMapping" ]; then
                  DEPLOY_ENDPOINT="$CPI_HOST/api/v1/DeployValueMappingDesigntimeArtifact?Id='$ARTIFACT_ID'&Version='active'"
                fi

                DEPLOY_RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
                  -X POST \
                  "$DEPLOY_ENDPOINT" \
                  -H "Authorization: Bearer $TOKEN")

                DEPLOY_STATUS=$(echo "$DEPLOY_RESPONSE" | grep HTTP_STATUS | cut -d: -f2)

                echo "$DEPLOY_RESPONSE"

                if [ "$DEPLOY_STATUS" != "200" ] && \
                   [ "$DEPLOY_STATUS" != "202" ]; then

                  echo "Deployment failed: $ARTIFACT_ID"

                  exit 1

                fi

                echo "Deployed: $ARTIFACT_ID"

              else

                echo "Runtime deploy not applicable for type '$TYPE' - skipping deploy step"

              fi

            done

            # -------------------------------------------------------
            # VALIDATE SINGLE ARTIFACT WAS FOUND
            # -------------------------------------------------------

            if [ "$DEPLOY_MODE" = "SINGLE" ] && \
               [ "$FOUND_ARTIFACT" = false ]; then

              echo "Artifact '$DEPLOY_ARTIFACT' not found in Git under $GIT_FOLDER"

              exit 1

            fi

          }


          # =========================================================
          # DISPATCH: SINGLE TYPE OR ALL TYPES
          # =========================================================

          if [ "$ARTIFACT_TYPE" = "All" ]; then

            for TYPE in IntegrationFlow MessageMapping ValueMapping ScriptCollection; do

              process_artifact_type "$TYPE"

            done

          else

            process_artifact_type "$ARTIFACT_TYPE"

          fi

          echo ""
          echo "Deployment completed successfully"