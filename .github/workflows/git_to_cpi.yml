name: Sync Git to SAP CPI

on:
  workflow_dispatch:
    inputs:
      sap_cpi_package_id:
        description: 'SAP CPI Package ID'
        required: true
        type: string
      artifact_type:
        description: 'Artifact Type to sync'
        required: true
        default: 'IntegrationFlow'
        type: choice
        options:
          - IntegrationFlow
          - ValueMapping
          - MessageMapping
          - ScriptCollection
          - all
      sync_mode:
        description: 'Sync Mode (SINGLE for specific artifact name, ALL for entire type/package)'
        required: true
        default: 'ALL'
        type: choice
        options:
          - ALL
          - SINGLE
      artifact_name:
        description: 'Artifact Name (Required only if Sync Mode is SINGLE)'
        required: false
        type: string
      target_git_branch:
        description: 'Target Git Branch to pull from'
        required: true
        type: string

jobs:
  sync-to-cpi:
    runs-on: ubuntu-latest
    
    env:
      CPI_HOST: ${{ secrets.CPI_TMN_HOST }}
      CPI_CLIENT_ID: ${{ secrets.CLIENT_ID }}
      CPI_CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
      CPI_TOKEN_URL: ${{ secrets.AUTH_URL }}

    steps:
      - name: Checkout Code from Target Branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.target_git_branch }}

      # Required to bundle the IFlow/Script folders into zip archives expected by CPI APIs
      - name: Install Zip Utility
        run: sudo apt-get update && sudo apt-get install -y zip

      - name: Validate Inputs and Sync Artifacts
        shell: bash
        run: |
          echo "========================================="
          echo " Starting Validation & Sync Process "
          echo "========================================="

          PACKAGE_ID="${{ github.event.inputs.sap_cpi_package_id }}"
          ARTIFACT_TYPE="${{ github.event.inputs.artifact_type }}"
          SYNC_MODE="${{ github.event.inputs.sync_mode }}"
          ARTIFACT_NAME="${{ github.event.inputs.artifact_name }}"
          GIT_BRANCH="${{ github.event.inputs.target_git_branch }}"

          # 1. BASE PACKAGE VALIDATION
          if [ ! -d "./$PACKAGE_ID" ]; then
            echo "❌ ERROR: Package folder './$PACKAGE_ID' does not exist in branch '$GIT_BRANCH'."
            exit 1
          fi

          if [[ ! "$PACKAGE_ID" =~ ^[a-zA-Z0-9_\-]+$ ]]; then
            echo "❌ ERROR: Invalid SAP CPI Package ID format: '$PACKAGE_ID'"
            exit 1
          fi

          # 2. CONDITIONAL VALIDATION FOR SINGLE SYNC
          if [ "$SYNC_MODE" == "SINGLE" ]; then
            if [ -z "$ARTIFACT_NAME" ]; then
              echo "❌ ERROR: Sync Mode is set to 'SINGLE' but no 'Artifact Name' was provided."
              exit 1
            fi
            
            if [ "$ARTIFACT_TYPE" != "all" ]; then
              LOCAL_PATH="./$PACKAGE_ID/$ARTIFACT_TYPE/$ARTIFACT_NAME"
              if [ ! -d "$LOCAL_PATH" ] && [ ! -f "$LOCAL_PATH" ]; then
                echo "❌ ERROR: Local path '$LOCAL_PATH' for artifact '$ARTIFACT_NAME' does not exist."
                exit 1
              fi
            fi
          fi

          if [ "$ARTIFACT_TYPE" == "all" ] && [ "$SYNC_MODE" == "SINGLE" ]; then
            echo "⚠️ WARNING: Conflict detected. Artifact Type is 'all', resetting Sync Mode to 'ALL'."
            SYNC_MODE="ALL"
          fi

          # 3. CPI AUTHENTICATION BLOCK
          echo "Fetching Access Token from SAP CPI Integration Suite..."
          if [ -z "$CPI_TOKEN_URL" ] || [ -z "$CPI_CLIENT_ID" ] || [ -z "$CPI_CLIENT_SECRET" ]; then
            echo "❌ ERROR: SAP CPI credentials are missing in GitHub secrets."
            exit 1
          fi

          TOKEN_RESPONSE=$(curl -s -X POST "$CPI_TOKEN_URL" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=client_credentials" \
            -d "client_id=$CPI_CLIENT_ID" \
            -d "client_secret=$CPI_CLIENT_SECRET")

          ACCESS_TOKEN=$(echo "$TOKEN_RESPONSE" | grep -oP '"access_token":"\K[^"]+')
          if [ -z "$ACCESS_TOKEN" ]; then
            echo "❌ ERROR: Failed to retrieve Access Token from SAP CPI."
            exit 1
          fi
          echo "Successfully authenticated with SAP CPI."

          # 4. LIVE UPLOAD FUNCTION
          upload_to_cpi() {
            local p_id=$1
            local folder_type=$2
            local a_name=$3
            local item_path="./$p_id/$folder_type/$a_name"
            
            echo "------------------------------------------------"
            echo "📦 Preparing Artifact: $a_name ($folder_type)"
            
            # Create a temporary working directory for compiling the artifact archive
            TMP_DIR=$(mktemp -d)
            ZIP_FILE="$TMP_DIR/$a_name.zip"

            # Check if it is a directory (unzipped IFlow structure) or a direct file
            if [ -d "$item_path" ]; then
              # Zip the inner contents of the directory directly (do not include parent folder hierarchy inside zip)
              (cd "$item_path" && zip -r "$ZIP_FILE" . > /dev/null)
            else
              # If it's a single raw file (like a standalone xml value mapping), bundle the file directly
              cp "$item_path" "$TMP_DIR/"
              (cd "$TMP_DIR" && zip "$ZIP_FILE" "$(basename "$item_path")" > /dev/null)
            fi

            # Check if artifact already exists in the package on CPI
            CHECK_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              -H "Authorization: Bearer $ACCESS_TOKEN" \
              "https://$CPI_HOST/api/v1/IntegrationPackages('$p_id')/IntegrationDesigntimeArtifacts(Id='$a_name',Version='active')")

            if [ "$CHECK_STATUS" == "200" ]; then
              echo "🔄 Artifact '$a_name' exists. Performing UPDATE (PUT method)..."
              
              HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X PUT \
                -H "Authorization: Bearer $ACCESS_TOKEN" \
                -F "file=@$ZIP_FILE" \
                "https://$CPI_HOST/api/v1/IntegrationPackages('$p_id')/IntegrationDesigntimeArtifacts(Id='$a_name',Version='active')")
            else
              echo "➕ Artifact '$a_name' does not exist. Performing CREATE (POST method)..."
              
              HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
                -H "Authorization: Bearer $ACCESS_TOKEN" \
                -H "Content-Type: application/json" \
                -d "{\"Id\":\"$a_name\", \"Name\":\"$a_name\"}" \
                "https://$CPI_HOST/api/v1/IntegrationPackages('$p_id')/IntegrationDesigntimeArtifacts")
                
              # After creating the empty shell reference entry, upload the resource binary contents
              HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X PUT \
                -H "Authorization: Bearer $ACCESS_TOKEN" \
                -F "file=@$ZIP_FILE" \
                "https://$CPI_HOST/api/v1/IntegrationPackages('$p_id')/IntegrationDesigntimeArtifacts(Id='$a_name',Version='active')")
            fi

            # Clean up local temporary file tracks
            rm -rf "$TMP_DIR"

            # Check execution API response boundaries (200 OK or 201 Created/Accepted)
            if [[ "$HTTP_CODE" =~ ^20[0-1]$ ]]; then
              echo "✅ Successfully synced and saved '$a_name' to CPI."
            else
              echo "❌ ERROR: Failed pushing '$a_name' to CPI. HTTP Response Code received: $HTTP_CODE"
              exit 1
            fi
          }

          echo "-----------------------------------------"
          echo " Executing Sync Operations "
          echo "-----------------------------------------"

          # ==========================================
          # BUILD ARTIFACT TYPE LIST
          # ==========================================

          declare -a ARTIFACT_TYPES

          if [ "$ARTIFACT_TYPE" = "all" ]; then

          echo "Artifact Type = ALL"
          echo "Sync Mode automatically set to ALL"

          SYNC_MODE="ALL"

          ARTIFACT_TYPES=(
          "IntegrationFlow"
          "MessageMapping"
          "ValueMapping"
          "ScriptCollection"
          )

          else

          ARTIFACT_TYPES=("$ARTIFACT_TYPE")

          fi

          # ==========================================
          # PROCESS TYPES
          # ==========================================

          for CURRENT_TYPE in "${ARTIFACT_TYPES[@]}"
          do

          TARGET_DIR="./$PACKAGE_ID/$CURRENT_TYPE"

          echo ""
          echo "========================================="
          echo "Processing Type : $CURRENT_TYPE"
          echo "Directory       : $TARGET_DIR"
          echo "========================================="

          if [ ! -d "$TARGET_DIR" ]; then
          echo "Directory not found. Skipping."
          continue
          fi

          # ========================================
          # SINGLE MODE
          # ========================================

          if [ "$SYNC_MODE" = "SINGLE" ]; then

          ITEM="$TARGET_DIR/$ARTIFACT_NAME"

          if [ ! -d "$ITEM" ] && [ ! -f "$ITEM" ]; then
          echo "Artifact not found:"
          echo "$ITEM"
          exit 1
          fi

          upload_to_cpi \
          "$PACKAGE_ID" \
          "$CURRENT_TYPE" \
          "$ARTIFACT_NAME"

          continue

          fi

          # ========================================
          # ALL MODE
          # ========================================

          FOUND=false

          for ITEM in "$TARGET_DIR"/*
          do

          [ -e "$ITEM" ] || continue

          FOUND=true

          ARTIFACT_BASE_NAME=$(basename "$ITEM")

          upload_to_cpi \
          "$PACKAGE_ID" \
          "$CURRENT_TYPE" \
          "$ARTIFACT_BASE_NAME"

          done

          if [ "$FOUND" = false ]; then
          echo "No artifacts found in:"
          echo "$TARGET_DIR"
          fi

          done

          echo ""
          echo "========================================="
          echo " Git → CPI Sync Completed Successfully "
          echo "========================================="