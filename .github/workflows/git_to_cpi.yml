name: Deploy Github Artifact to SAP CPI

on:
  workflow_dispatch:
    inputs:

      PACKAGE_ID:
        description: "GitHub Package ID"
        required: true
        type: string

      ARTIFACT_TYPE:
        description: "Artifact Type"
        required: true
        default: "Integration Flow"
        type: choice
        options:
          - Integration Flow

      DEPLOY_MODE:
        description: "Deployment Mode"
        required: true
        default: "PACKAGE"
        type: choice
        options:
          - PACKAGE
          - ALL
          - SINGLE

      ARTIFACT_ID:
        description: "Artifact ID (Required for SINGLE mode)"
        required: false
        type: string

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

      # =========================================================
      # CHECKOUT REPOSITORY
      # =========================================================

      - name: Checkout Repository
        uses: actions/checkout@v4

      # =========================================================
      # INSTALL REQUIRED PACKAGES
      # =========================================================

      - name: Install Required Packages
        run: |

          sudo apt-get update

          sudo apt-get install -y zip jq curl

      # =========================================================
      # DEPLOY TO SAP CPI
      # =========================================================

      - name: Deploy Artifacts to SAP CPI

        env:
          CPI_CLIENT_ID: ${{ secrets.CLIENT_ID }}
          CPI_CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          CPI_TOKEN_URL: ${{ secrets.AUTH_URL }}
          CPI_HOST: ${{ secrets.CPI_TMN_HOST }}

        run: |

          set -e

          PACKAGE_ID="${{ github.event.inputs.PACKAGE_ID }}"
          ARTIFACT_TYPE="${{ github.event.inputs.ARTIFACT_TYPE }}"
          DEPLOY_MODE="${{ github.event.inputs.DEPLOY_MODE }}"
          DEPLOY_ARTIFACT="${{ github.event.inputs.ARTIFACT_ID }}"

          # =========================================================
          # VALIDATE SINGLE MODE
          # =========================================================

          if [ "$DEPLOY_MODE" = "SINGLE" ] && \
             [ -z "$DEPLOY_ARTIFACT" ]; then

            echo "❌ ARTIFACT_ID is required for SINGLE mode"

            exit 1

          fi

          # =========================================================
          # FETCH OAUTH TOKEN
          # =========================================================

          echo "🔑 Fetching OAuth token..."

          TOKEN_RESPONSE=$(curl -s -X POST \
            -u "$CPI_CLIENT_ID:$CPI_CLIENT_SECRET" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=client_credentials" \
            "$CPI_TOKEN_URL")

          TOKEN=$(echo "$TOKEN_RESPONSE" | jq -r '.access_token')

          if [ "$TOKEN" = "null" ] || \
             [ -z "$TOKEN" ]; then

            echo "❌ Failed to get access token"

            echo "$TOKEN_RESPONSE"

            exit 1

          fi

          echo "✅ OAuth token fetched"

          # =========================================================
          # VERIFY CPI API ACCESS
          # =========================================================

          echo "🔍 Testing CPI API access..."

          TEST_RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
            "$CPI_HOST/api/v1/IntegrationPackages" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/json")

          TEST_STATUS=$(echo "$TEST_RESPONSE" | grep HTTP_STATUS | cut -d: -f2)

          if [ "$TEST_STATUS" != "200" ]; then

            echo "❌ CPI API access failed"

            echo "$TEST_RESPONSE"

            exit 1

          fi

          echo "✅ CPI API access verified"


          # =========================================================
          # VALIDATE / CREATE PACKAGE
          # =========================================================

          echo "🔍 Checking package: $PACKAGE_ID"

          ENCODED_PACKAGE_ID=$(printf '%s' "$PACKAGE_ID" | sed 's/ /%20/g')

          PACKAGE_STATUS=$(curl -s \
            -o /dev/null \
            -w "%{http_code}" \
            -X GET \
            "$CPI_HOST/api/v1/IntegrationPackages('$ENCODED_PACKAGE_ID')" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/json")

          # =========================================================
          # PACKAGE EXISTS
          # =========================================================

          if [ "$PACKAGE_STATUS" = "200" ]; then

            echo "✅ Package exists in CPI"

          # =========================================================
          # CREATE PACKAGE
          # =========================================================

          elif [ "$PACKAGE_STATUS" = "404" ]; then

            echo "⚠️ Package not found in CPI"

            echo "📦 Creating package: $PACKAGE_ID"

            CREATE_RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
              -X POST \
              "$CPI_HOST/api/v1/IntegrationPackages" \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" \
              -d "{
                \"Id\": \"$PACKAGE_ID\",
                \"Name\": \"$PACKAGE_ID\",
                \"ShortText\": \"$PACKAGE_ID\",
                \"Version\": \"1.0.0\"
              }")

            CREATE_STATUS=$(echo "$CREATE_RESPONSE" | grep HTTP_STATUS | cut -d: -f2)

            echo "$CREATE_RESPONSE"

            if [ "$CREATE_STATUS" != "201" ] && \
              [ "$CREATE_STATUS" != "200" ]; then

              echo "❌ Package creation failed"

              exit 1

            fi

            echo "✅ Package created successfully"

          else

            echo "❌ Failed checking package"

            exit 1

          fi


          # =========================================================
          # SET ARTIFACT ROOT
          # =========================================================

          if [ "$ARTIFACT_TYPE" = "Integration Flow" ]; then

            ARTIFACT_ROOT="${{ github.workspace }}/${PACKAGE_ID}/IntegrationFlow"

          else

            echo "❌ Invalid ARTIFACT_TYPE"

            exit 1

          fi

          # =========================================================
          # VALIDATE PACKAGE DIRECTORY
          # =========================================================

          if [ ! -d "$ARTIFACT_ROOT" ]; then

            echo "❌ Package folder not found in Git"

            echo "$ARTIFACT_ROOT"

            exit 1

          fi

          echo "📦 Reading artifacts from: $ARTIFACT_ROOT"

          FOUND_ARTIFACT=false

          # =========================================================
          # PACKAGE MODE
          # DELETE CPI ARTIFACTS NOT PRESENT IN GIT
          # =========================================================

          if [ "$DEPLOY_MODE" = "PACKAGE" ]; then

            echo "🔄 PACKAGE sync enabled"

            echo "📡 Reading CPI artifacts..."

            CPI_ARTIFACTS=$(curl -s \
              "$CPI_HOST/api/v1/IntegrationPackages('$PACKAGE_ID')/IntegrationDesigntimeArtifacts" \
              -H "Authorization: Bearer $TOKEN" \
              -H "Accept: application/json" | jq -r '.d.results[]?.Id')

            for CPI_ARTIFACT in $CPI_ARTIFACTS; do

              if [ ! -d "$ARTIFACT_ROOT/$CPI_ARTIFACT" ]; then

                echo "🗑️ Artifact deleted from Git"

                echo "🗑️ Removing from CPI: $CPI_ARTIFACT"

                DELETE_RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
                  -X DELETE \
                  "$CPI_HOST/api/v1/IntegrationDesigntimeArtifacts(Id='$CPI_ARTIFACT',Version='active')" \
                  -H "Authorization: Bearer $TOKEN")

                DELETE_STATUS=$(echo "$DELETE_RESPONSE" | grep HTTP_STATUS | cut -d: -f2)

                echo "$DELETE_RESPONSE"

                if [ "$DELETE_STATUS" != "200" ] && \
                   [ "$DELETE_STATUS" != "202" ] && \
                   [ "$DELETE_STATUS" != "204" ]; then

                  echo "❌ Failed deleting artifact: $CPI_ARTIFACT"

                  exit 1

                fi

                echo "✅ Deleted artifact from CPI"

              fi

            done

          fi

          # =========================================================
          # PROCESS EACH ARTIFACT
          # =========================================================

          for ARTIFACT_DIR in "$ARTIFACT_ROOT"/*; do

            [ -d "$ARTIFACT_DIR" ] || continue

            ARTIFACT_ID=$(basename "$ARTIFACT_DIR")

            # =====================================================
            # VALIDATE SINGLE ARTIFACT
            # =====================================================

            if [ "$DEPLOY_MODE" = "SINGLE" ] && \
               [ "$ARTIFACT_ID" = "$DEPLOY_ARTIFACT" ]; then

              FOUND_ARTIFACT=true

            fi

            # =====================================================
            # SKIP NON-SELECTED ARTIFACTS
            # =====================================================

            if [ "$DEPLOY_MODE" = "SINGLE" ] && \
               [ "$ARTIFACT_ID" != "$DEPLOY_ARTIFACT" ]; then

              echo "⏭️ Skipping artifact: $ARTIFACT_ID"

              continue

            fi

            ZIP_FILE="/tmp/${ARTIFACT_ID}.zip"

            echo "------------------------------------------------"

            echo "📥 Processing artifact: $ARTIFACT_ID"

            rm -f "$ZIP_FILE"

            # =====================================================
            # CREATE ZIP
            # =====================================================

            echo "🗜️ Creating ZIP package..."

            (
              cd "$ARTIFACT_DIR"

              zip -r "$ZIP_FILE" .
            )

            if [ ! -f "$ZIP_FILE" ]; then

              echo "❌ ZIP creation failed"

              exit 1

            fi

            CONTENT=$(base64 -w 0 "$ZIP_FILE")

            # =====================================================
            # TRY UPDATE FIRST
            # =====================================================

            echo "♻️ Attempting UPDATE..."

            RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
              -X PUT \
              "$CPI_HOST/api/v1/IntegrationDesigntimeArtifacts(Id='$ARTIFACT_ID',Version='active')" \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" \
              -d "{
                \"Name\": \"$ARTIFACT_ID\",
                \"PackageId\": \"$PACKAGE_ID\",
                \"ArtifactContent\": \"$CONTENT\"
              }")

            STATUS=$(echo "$RESPONSE" | grep HTTP_STATUS | cut -d: -f2)

            echo "$RESPONSE"

            # =====================================================
            # UPDATE SUCCESS
            # =====================================================

            if [ "$STATUS" = "200" ] || \
               [ "$STATUS" = "201" ] || \
               [ "$STATUS" = "202" ]; then

              echo "✅ UPDATE successful"

            else

              echo "⚠️ UPDATE failed. Trying CREATE..."

              # =================================================
              # CREATE ARTIFACT
              # =================================================

              RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
                -X POST \
                "$CPI_HOST/api/v1/IntegrationPackages('$PACKAGE_ID')/IntegrationDesigntimeArtifacts" \
                -H "Authorization: Bearer $TOKEN" \
                -H "Content-Type: application/json" \
                -d "{
                  \"Id\": \"$ARTIFACT_ID\",
                  \"Name\": \"$ARTIFACT_ID\",
                  \"PackageId\": \"$PACKAGE_ID\",
                  \"ArtifactContent\": \"$CONTENT\"
                }")

              STATUS=$(echo "$RESPONSE" | grep HTTP_STATUS | cut -d: -f2)

              echo "$RESPONSE"

              # =================================================
              # HANDLE ALREADY EXISTS
              # =================================================

              if echo "$RESPONSE" | grep -qi "already exists"; then

                echo "⚠️ Artifact already exists"

                echo "🔁 Retrying UPDATE..."

                RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
                  -X PUT \
                  "$CPI_HOST/api/v1/IntegrationDesigntimeArtifacts(Id='$ARTIFACT_ID',Version='active')" \
                  -H "Authorization: Bearer $TOKEN" \
                  -H "Content-Type: application/json" \
                  -d "{
                    \"Name\": \"$ARTIFACT_ID\",
                    \"PackageId\": \"$PACKAGE_ID\",
                    \"ArtifactContent\": \"$CONTENT\"
                  }")

                STATUS=$(echo "$RESPONSE" | grep HTTP_STATUS | cut -d: -f2)

                echo "$RESPONSE"

              fi

              # =================================================
              # FINAL VALIDATION
              # =================================================

              if [ "$STATUS" != "200" ] && \
                 [ "$STATUS" != "201" ] && \
                 [ "$STATUS" != "202" ]; then

                echo "❌ Artifact create/update failed"

                exit 1

              fi

            fi

            # =====================================================
            # DEPLOY ARTIFACT
            # =====================================================

            echo "🚀 Deploying artifact..."

            DEPLOY_RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
              -X POST \
              "$CPI_HOST/api/v1/DeployIntegrationDesigntimeArtifact?Id='$ARTIFACT_ID'&Version='active'" \
              -H "Authorization: Bearer $TOKEN")

            DEPLOY_STATUS=$(echo "$DEPLOY_RESPONSE" | grep HTTP_STATUS | cut -d: -f2)

            echo "$DEPLOY_RESPONSE"

            if [ "$DEPLOY_STATUS" != "200" ] && \
               [ "$DEPLOY_STATUS" != "202" ]; then

              echo "❌ Deployment failed for $ARTIFACT_ID"

              exit 1

            fi

            echo "✅ Successfully deployed: $ARTIFACT_ID"

          done

          # =========================================================
          # VALIDATE SINGLE ARTIFACT EXISTS
          # =========================================================

          if [ "$DEPLOY_MODE" = "SINGLE" ] && \
             [ "$FOUND_ARTIFACT" = false ]; then

            echo "❌ Artifact not found in Git repository: $DEPLOY_ARTIFACT"

            exit 1

          fi

          echo "🎉 Deployment completed successfully"
